name: Build APK

on:
  workflow_dispatch:
    inputs:
      release_label:
        description: "Release label for artifact naming"
        required: false
        default: "snapshot"
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK Components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0" "ndk;26.3.11579264"

      - name: Grant Gradle Execute Permission
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Collect Build Outputs
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/*.apk out/ || true
          ls -la out

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: toolneuron-${{ github.event.inputs.release_label || 'snapshot' }}-${{ github.run_number }}
          path: out/*
          if-no-files-found: error
